version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: love-blog-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myhx0308}
      POSTGRES_DB: love_blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: love-blog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: love-blog-backend
    environment:
      APP_ENV: production
      APP_PORT: 8979
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-myhx0308}
      DB_NAME: love_blog
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string}
      JWT_EXPIRE_HOURS: 72
      UPLOAD_DIR: /app/uploads
      REDIS_ADDR: redis:6379
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8979:8979"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: love-blog-frontend
    ports:
      - "6100:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
