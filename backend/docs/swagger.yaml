definitions:
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.PublishPostRequest:
    properties:
      published_at:
        type: string
    type: object
  dto.SaveCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
      slug:
        type: string
    required:
    - name
    - slug
    type: object
  dto.SavePostRequest:
    properties:
      category_id:
        type: integer
      content_html:
        type: string
      content_markdown:
        type: string
      cover_image:
        type: string
      is_top:
        type: boolean
      published_at:
        type: string
      slug:
        type: string
      status:
        type: string
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        type: string
    required:
    - slug
    - title
    type: object
  dto.SaveSiteSettingRequest:
    properties:
      about_text:
        type: string
      logo:
        type: string
      site_name:
        type: string
      site_subtitle:
        type: string
      theme_color:
        type: string
    type: object
  dto.SaveTagRequest:
    properties:
      name:
        type: string
      slug:
        type: string
    required:
    - name
    - slug
    type: object
  dto.TopPostRequest:
    properties:
      is_top:
        type: boolean
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
